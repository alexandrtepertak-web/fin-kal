<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>💰 Премиум‑бюджет Mobile</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #f5f7fb;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      color: #1e293b;
      padding: 0.5rem;
    }
    body.dark {
      background: #0f172a;
      color: #e2e8f0;
    }
    .app {
      width: 100%;
      max-width: 100%;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(15px);
      border-radius: 1.5rem;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border: 1px solid rgba(0,0,0,0.05);
    }
    body.dark .app {
      background: rgba(30,41,59,0.95);
      border-color: rgba(255,255,255,0.1);
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #1e293b, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    body.dark h1 {
      background: linear-gradient(135deg, #e2e8f0, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .month-nav {
      display: flex;
      align-items: center;
      gap: 0.2rem;
      background: rgba(241,245,249,0.8);
      backdrop-filter: blur(8px);
      border-radius: 2rem;
      padding: 0.3rem 0.8rem;
    }
    body.dark .month-nav { background: rgba(51,65,85,0.8); }
    .month-btn {
      background: none; border: none; font-size: 1.1rem; cursor: pointer;
      padding: 0.3rem 0.5rem; border-radius: 1.5rem; color: #475569; transition: 0.2s;
    }
    body.dark .month-btn { color: #cbd5e1; }
    .current-month { font-weight: 600; font-size: 0.9rem; min-width: 100px; text-align: center; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      align-items: center;
    }
    .btn {
      border: none;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
      padding: 0.5rem 0.8rem;
      border-radius: 1.8rem;
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.03);
      color: #1e293b;
      border: 1px solid rgba(0,0,0,0.05);
      white-space: nowrap;
    }
    body.dark .btn { background: rgba(51,65,85,0.8); color: #e2e8f0; border-color: rgba(255,255,255,0.1); }
    .btn.primary { background: linear-gradient(135deg, #0f172a, #1e293b); color: white; }
    .btn.danger { background: rgba(248,113,113,0.15); color: #b91c1c; }
    .kpi-row {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      font-weight: 500;
      background: rgba(241,245,249,0.7);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 0.6rem 0.8rem;
      font-size: 0.8rem;
    }
    .kpi-item strong { font-weight: 700; font-size: 1rem; }
    .table-panel {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      border: 1px solid rgba(0,0,0,0.05);
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    body.dark .table-panel { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.1); }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.7rem;
      white-space: nowrap;
    }
    th {
      background: rgba(241,245,249,0.9);
      font-weight: 700;
      padding: 0.5rem 0.2rem;
      text-align: center;
      border-bottom: 1px solid #cbd5e1;
      position: sticky;
      top: 0;
      z-index: 3;
      min-width: 35px;
    }
    body.dark th { background: rgba(51,65,85,0.9); border-bottom-color: #475569; }
    td {
      padding: 0.4rem 0.2rem;
      text-align: center;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    th:first-child, td:first-child {
      position: sticky;
      left: 0;
      background: #f8fafc;
      z-index: 2;
      min-width: 120px;
      text-align: left;
      padding-left: 0.5rem;
      border-right: 1px solid #e2e8f0;
    }
    body.dark th:first-child, body.dark td:first-child { background: #1e293b; border-right-color: #475569; }
    thead th:first-child { z-index: 4; background: #f1f5f9; }
    body.dark thead th:first-child { background: #334155; }
    .money-input {
      width: 55px;
      padding: 0.3rem;
      text-align: center;
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 8px;
      background: rgba(255,255,255,0.9);
      font-size: 0.7rem;
      font-weight: 500;
    }
    body.dark .money-input { background: rgba(51,65,85,0.9); border-color: rgba(255,255,255,0.15); color: white; }
    .money-input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59,130,246,0.3); }
    .today-col { background: #ffedd5 !important; box-shadow: inset 0 0 0 1px #fb923c; }
    th.today-col { background: #fb923c !important; color: white; }
    .total-cell { font-weight: 700; background: #f1f5f9; }
    body.dark .total-cell { background: #334155; }
    .remove-btn { background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 0.9rem; padding: 0; }
    .year-stats {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      background: rgba(241,245,249,0.7);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      padding: 0.6rem 0.8rem;
      font-size: 0.75rem;
      font-weight: 500;
    }
    .accordion-grid {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .accordion {
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border-radius: 1rem;
      border: 1px solid rgba(0,0,0,0.05);
      transition: all 0.2s;
    }
    body.dark .accordion { background: rgba(30,41,59,0.7); border-color: rgba(255,255,255,0.1); }
    .accordion-header {
      padding: 0.7rem 0.8rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .accordion-body {
      padding: 0 0.8rem 0.8rem;
      display: none;
    }
    .accordion.open .accordion-body { display: block; }
    .budget-progress { height: 6px; background: #e2e8f0; border-radius: 3px; overflow: hidden; margin: 0.4rem 0; }
    .budget-fill { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); transition: width 0.3s; }
    .daily-limit { font-weight: 600; font-size: 0.7rem; }
    .chart-container { max-width: 100%; margin: 0 auto; }
    .theme-toggle {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      width: 40px;
      height: 40px;
      background: rgba(255,255,255,0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 100;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    body.dark .theme-toggle { background: rgba(51,65,85,0.8); color: #fbbf24; }
    input, select { font-family: inherit; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1 id="motivationTitle">💎 Бюджет</h1>
    <div class="month-nav">
      <button class="month-btn" id="prevMonthBtn">◀</button>
      <span class="current-month" id="currentMonthLabel">Май</span>
      <button class="month-btn" id="nextMonthBtn">▶</button>
      <button class="month-btn" id="todayBtn">📍</button>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn primary" id="addIncomeCatBtn">➕</button>
    <button class="btn primary" id="addExpenseCatBtn">➖</button>
    <button class="btn" id="undoBtn">↩</button>
    <button class="btn" id="scrollTodayBtn">📍 Сегодня</button>
    <button class="btn danger" id="clearAllDataBtn">🗑️</button>
    <button class="btn" id="backupBtn">💾</button>
    <button class="btn" id="restoreBtn">📥</button>
  </div>

  <div class="kpi-row">
    <span>💰 <strong id="balanceKPI">0</strong></span>
    <span>📈 <strong id="incomeMonthKPI">0</strong></span>
    <span>📉 <strong id="expenseMonthKPI">0</strong></span>
  </div>

  <div class="table-panel" id="tableContainer"></div>

  <div class="year-stats">
    <div>📈 Год: <strong id="incomeYearKPI">0</strong></div>
    <div>📉 Год: <strong id="expenseYearKPI">0</strong></div>
    <div>🏦 <strong id="savingsKPI">0</strong></div>
    <div>💳 <strong id="debtKPI">0</strong></div>
  </div>

  <div class="accordion-grid">
    <div class="accordion" id="accPayments">
      <div class="accordion-header">📅 Платежи ▾</div>
      <div class="accordion-body">
        <input type="text" id="paymentNameInput" placeholder="Название" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <input type="number" id="paymentAmountInput" placeholder="Сумма" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <input type="date" id="paymentDateInput" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <button class="btn" id="addPaymentBtn" style="width:100%; margin-top:0.2rem;">Добавить</button>
        <div id="paymentsList" style="margin-top:0.4rem;"></div>
      </div>
    </div>
    <div class="accordion" id="accBudget">
      <div class="accordion-header">🎯 Бюджет ▾</div>
      <div class="accordion-body">
        <input type="number" id="budgetLimitInput" placeholder="Лимит, ₽" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <div class="budget-progress"><div class="budget-fill" id="budgetFill" style="width:0%"></div></div>
        <small id="budgetText">0 из 0 ₽</small>
        <div class="daily-limit" id="dailyLimitText">0 ₽/день</div>
      </div>
    </div>
    <div class="accordion" id="accGoals">
      <div class="accordion-header">🎯 Цели ▾</div>
      <div class="accordion-body">
        <input type="text" id="goalNameInput" placeholder="Цель" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <input type="number" id="goalTargetInput" placeholder="Сумма" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <button class="btn" id="addGoalBtn" style="width:100%; margin-top:0.2rem;">Создать</button>
        <div id="goalsList" style="margin-top:0.4rem;"></div>
      </div>
    </div>
    <div class="accordion" id="accDebts">
      <div class="accordion-header">🤝 Долги ▾</div>
      <div class="accordion-body">
        <input type="text" id="debtPersonInput" placeholder="Кому/От кого" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <input type="number" id="debtAmountInput" placeholder="Сумма" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <button class="btn" id="addDebtBtn" style="width:100%; margin-top:0.2rem;">Добавить</button>
        <div id="debtList" style="margin-top:0.4rem;"></div>
      </div>
    </div>
    <div class="accordion" id="accCredit">
      <div class="accordion-header">💳 Кредит ▾</div>
      <div class="accordion-body">
        <input type="number" id="creditTotalInput" placeholder="Сумма долга" style="width:100%; padding:0.4rem; border-radius:0.6rem; border:1px solid #ccc; margin:0.2rem 0;">
        <small>Остаток: <span id="creditRemaining">0</span> ₽</small>
        <button class="btn" id="payCreditBtn" style="width:100%; margin-top:0.4rem;">Внести платёж</button>
      </div>
    </div>
    <div class="accordion" id="accTop">
      <div class="accordion-header">📊 Топ-5 ▾</div>
      <div class="accordion-body" id="topCategories"></div>
    </div>
  </div>

  <!-- Диаграмма расходов по категориям -->
  <div class="chart-container" style="margin-top:0.5rem;">
    <canvas id="expenseChart" height="200"></canvas>
  </div>
</div>

<button class="theme-toggle" id="themeToggle">🌓</button>

<script>
(function() {
  const STORAGE = 'premium_budget_mobile';
  const UNDO_STACK = [];
  let currentYear, currentMonth;
  let incomeCategories = [], expenseCategories = [];
  let data = {};
  let debts = [], goals = [], creditTotal = 0, payments = [];
  let chartInstance = null;

  const motivationalPhrases = [
    "💎 Твои деньги любят жесткий счет","💎 Управляй кэшем, а не ной","💎 Хватит тратить вслепую, считай прибыль",
    "💎 Подчини свои финансы своим правилам","💎 Деньги текут к тем, кто считает","💎 Хватит считать копейки, считай миллионы",
    "💎 Твой кошелек — твоя личная зона власти","💎 Точный расчет — твой финансовый успех","💎 Каждый клик приближает твою мечту",
    "💎 Управляй доходами, создавай свое будущее","💎 Твой личный шаг к финансовой свободе","💎 Контролируй расходы — умножай свои деньги"
  ];

  const dayAbbr = ["вс", "пн", "вт", "ср", "чт", "пт", "сб"];

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;'
    })[m]);
  }

  function initDate() { const n=new Date(); currentYear=n.getFullYear(); currentMonth=n.getMonth()+1; }
  function daysInMonth(y,m){ return new Date(y,m,0).getDate(); }
  function getVal(type,catId,y,m,d){ const key=`${type}_${catId}_${y}_${m}_${d}`; const v=data[key]; return (v!==undefined&&!isNaN(v))?v:''; }
  function setVal(type,catId,y,m,d,value){ const key=`${type}_${catId}_${y}_${m}_${d}`; if(value===''||value===null) delete data[key]; else{ const n=parseFloat(value); if(!isNaN(n)) data[key]=n; else delete data[key]; } }
  function genId(){ return Date.now().toString(36)+Math.random().toString(36).substr(2,6); }
  function pushUndo(){ UNDO_STACK.push({ incomeCategories:JSON.parse(JSON.stringify(incomeCategories)), expenseCategories:JSON.parse(JSON.stringify(expenseCategories)), data:JSON.parse(JSON.stringify(data)), debts:JSON.parse(JSON.stringify(debts)), goals:JSON.parse(JSON.stringify(goals)), creditTotal, payments:JSON.parse(JSON.stringify(payments)) }); if(UNDO_STACK.length>20) UNDO_STACK.shift(); }
  function save(){ localStorage.setItem(STORAGE, JSON.stringify({ incomeCategories, expenseCategories, data, debts, goals, creditTotal, payments })); }
  function load(){
    const raw=localStorage.getItem(STORAGE);
    if(raw){ try{ const o=JSON.parse(raw); incomeCategories=o.incomeCategories||[]; expenseCategories=o.expenseCategories||[]; data=o.data||{}; debts=o.debts||[]; goals=o.goals||[]; creditTotal=o.creditTotal||0; payments=o.payments||[]; }catch(e){} }
    if(incomeCategories.length===0) incomeCategories.push({id:genId(),name:'Зарплата'});
    if(expenseCategories.length===0){ expenseCategories.push({id:genId(),name:'Продукты'}); expenseCategories.push({id:genId(),name:'Кредит'}); }
  }

  function computeMonth(){
    const days=daysInMonth(currentYear,currentMonth); let ti=0,te=0;
    incomeCategories.forEach(c=>{ for(let d=1;d<=days;d++){ const v=getVal('inc',c.id,currentYear,currentMonth,d); if(v!=='') ti+=v; } });
    expenseCategories.forEach(c=>{ for(let d=1;d<=days;d++){ const v=getVal('exp',c.id,currentYear,currentMonth,d); if(v!=='') te+=v; } });
    return {days, totalInc:ti, totalExp:te, balance:ti-te};
  }

  function getDayOfWeek(day) { return new Date(currentYear, currentMonth-1, day).getDay(); }

  function scrollToToday() {
    const today = new Date();
    if (today.getFullYear() === currentYear && today.getMonth()+1 === currentMonth) {
      const todayDay = today.getDate();
      const th = document.querySelector(`th[data-day="${todayDay}"]`);
      if (th) th.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }

  function removeCategory(type, catId) {
    if (type === 'inc') {
      incomeCategories = incomeCategories.filter(c => c.id !== catId);
    } else {
      expenseCategories = expenseCategories.filter(c => c.id !== catId);
    }
    // Удаляем все связанные данные
    Object.keys(data).forEach(key => {
      if (key.startsWith(`${type}_${catId}_`)) delete data[key];
    });
    save();
    renderAll();
  }

  function renderAll() {
    document.getElementById('motivationTitle').textContent = motivationalPhrases[currentMonth-1];
    renderTable();
    updateTotals();
    renderDebts();
    renderGoals();
    renderPayments();
    renderTopCategories();
    renderChart();
    setTimeout(scrollToToday, 200);
  }

  function renderTable() {
    const months = ["Янв","Фев","Мар","Апр","Май","Июн","Июл","Авг","Сен","Окт","Ноя","Дек"];
    document.getElementById('currentMonthLabel').textContent = `${months[currentMonth-1]} ${currentYear}`;
    const {days} = computeMonth();
    const today = new Date();
    const todayDay = (today.getFullYear()===currentYear && today.getMonth()+1===currentMonth) ? today.getDate() : -1;
    let html = '<table><thead><tr><th>Кат.</th>';
    for (let d=1; d<=days; d++) {
      const dow = getDayOfWeek(d);
      html += `<th class="${d===todayDay?'today-col':''}" data-day="${d}">${d}<br>${dayAbbr[dow]}</th>`;
    }
    html += '<th>Итог</th></tr></thead><tbody>';

    html += `<tr><td colspan="${days+2}" style="text-align:left; font-weight:700;">📈 Доходы</td></tr>`;
    incomeCategories.forEach(cat=>{
      html += `<tr><td>${escapeHtml(cat.name)} <button class="remove-btn remove-cat" data-id="${cat.id}" data-type="inc">✕</button></td>`;
      for(let d=1;d<=days;d++) {
        html += `<td><input class="money-input" data-type="inc" data-cat="${cat.id}" data-day="${d}" value="${getVal('inc',cat.id,currentYear,currentMonth,d)}"></td>`;
      }
      html += `<td class="total-cell" id="total-inc-${cat.id}">0</td></tr>`;
    });
    html += `<tr><td>Итого</td>`;
    for(let d=1;d<=days;d++) html += `<td class="total-cell" id="day-inc-total-${d}">0</td>`;
    html += `<td class="total-cell" id="grand-inc-total">0</td></tr>`;

    html += `<tr><td colspan="${days+2}" style="text-align:left; font-weight:700;">📉 Расходы</td></tr>`;
    expenseCategories.forEach(cat=>{
      html += `<tr><td>${escapeHtml(cat.name)} <button class="remove-btn remove-cat" data-id="${cat.id}" data-type="exp">✕</button></td>`;
      for(let d=1;d<=days;d++) {
        html += `<td><input class="money-input" data-type="exp" data-cat="${cat.id}" data-day="${d}" value="${getVal('exp',cat.id,currentYear,currentMonth,d)}"></td>`;
      }
      html += `<td class="total-cell" id="total-exp-${cat.id}">0</td></tr>`;
    });
    html += `<tr><td>Итого</td>`;
    for(let d=1;d<=days;d++) html += `<td class="total-cell" id="day-exp-total-${d}">0</td>`;
    html += `<td class="total-cell" id="grand-exp-total">0</td></tr>`;

    html += `<tr><td>💰 Баланс</td>`;
    for(let d=1;d<=days;d++) html += `<td id="day-balance-${d}">0</td>`;
    html += `<td class="total-cell" id="grand-balance">0</td></tr>`;
    html += '</tbody></table>';
    document.getElementById('tableContainer').innerHTML = html;
  }

  function updateTotals() {
    const {days, totalInc, totalExp, balance} = computeMonth();
    const budgetLimit = parseFloat(localStorage.getItem('budget_limit')||'0');
    const today = new Date();
    const todayDay = (today.getFullYear()===currentYear && today.getMonth()+1===currentMonth) ? today.getDate() : days;
    const remainingDays = days - todayDay + 1;
    const dailyLimit = remainingDays>0 ? (budgetLimit - totalExp) / remainingDays : 0;
    document.getElementById('dailyLimitText').textContent = `${dailyLimit.toFixed(0)} ₽/день`;
    document.getElementById('creditRemaining').textContent = creditTotal.toFixed(0);
    document.getElementById('incomeMonthKPI').textContent = totalInc.toFixed(0);
    document.getElementById('expenseMonthKPI').textContent = totalExp.toFixed(0);
    document.getElementById('balanceKPI').textContent = balance.toFixed(0);

    let yearInc=0, yearExp=0;
    for(let m=1; m<=12; m++) {
      const dM = daysInMonth(currentYear,m);
      incomeCategories.forEach(c=>{ for(let d=1; d<=dM; d++){ const v=getVal('inc',c.id,currentYear,m,d); if(v!=='') yearInc+=v; } });
      expenseCategories.forEach(c=>{ for(let d=1; d<=dM; d++){ const v=getVal('exp',c.id,currentYear,m,d); if(v!=='') yearExp+=v; } });
    }
    document.getElementById('incomeYearKPI').textContent = yearInc.toFixed(0);
    document.getElementById('expenseYearKPI').textContent = yearExp.toFixed(0);
    document.getElementById('savingsKPI').textContent = goals.reduce((s,g)=>s+g.saved,0).toFixed(0);
    document.getElementById('debtKPI').textContent = creditTotal.toFixed(0);

    for(let d=1; d<=days; d++) {
      let inc=0, exp=0;
      incomeCategories.forEach(c=>{ const v=getVal('inc',c.id,currentYear,currentMonth,d); if(v!=='') inc+=v; });
      expenseCategories.forEach(c=>{ const v=getVal('exp',c.id,currentYear,currentMonth,d); if(v!=='') exp+=v; });
      const incEl=document.getElementById(`day-inc-total-${d}`), expEl=document.getElementById(`day-exp-total-${d}`), balEl=document.getElementById(`day-balance-${d}`);
      if(incEl) incEl.textContent=inc;
      if(expEl) expEl.textContent=exp;
      if(balEl){ balEl.textContent=inc-exp; balEl.style.color=(inc-exp)<0?'#b91c1c':'#0f172a'; }
    }
    document.getElementById('grand-inc-total').textContent=totalInc;
    document.getElementById('grand-exp-total').textContent=totalExp;

    const limit=parseFloat(localStorage.getItem('budget_limit')||'0');
    document.getElementById('budgetFill').style.width=(limit>0?Math.min(100,(totalExp/limit)*100):0)+'%';
    document.getElementById('budgetText').textContent=`${totalExp.toFixed(0)} из ${limit.toFixed(0)} ₽`;
  }

  function renderDebts() { document.getElementById('debtList').innerHTML = debts.map((d,i)=>`<div>${escapeHtml(d.person)}: ${d.amount}₽ <button class="delete-debt" data-index="${i}">✕</button></div>`).join(''); }
  function renderGoals() {
    document.getElementById('goalsList').innerHTML = goals.map((g,i)=>{
      const p = g.target>0 ? ((g.saved/g.target)*100).toFixed(0) : 0;
      return `<div>${escapeHtml(g.name)}: ${g.saved}/${g.target}₽ (${p}%) <button class="delete-goal" data-index="${i}">✕</button> <button class="add-to-goal" data-index="${i}">+</button></div>`;
    }).join('');
  }
  function renderPayments() {
    document.getElementById('paymentsList').innerHTML = payments.map((p,i)=>`<div style="color:${p.paid?'green':'red'}">${escapeHtml(p.name)} ${p.amount}₽ ${p.date}
      <button class="toggle-paid" data-index="${i}">${p.paid?'✓':'✗'}</button><button class="delete-payment" data-index="${i}">✕</button></div>`).join('');
  }
  function renderTopCategories() {
    const agg = {};
    expenseCategories.forEach(c=>{ for(let d=1; d<=daysInMonth(currentYear,currentMonth); d++){ const v=getVal('exp',c.id,currentYear,currentMonth,d); if(v!=='') agg[c.name]=(agg[c.name]||0)+v; } });
    const sorted = Object.entries(agg).sort((a,b)=>b[1]-a[1]).slice(0,5);
    document.getElementById('topCategories').innerHTML = sorted.map(([n,s])=>`<div>${escapeHtml(n)}: ${s.toFixed(0)}₽</div>`).join('');
  }

  function renderChart() {
    const ctx = document.getElementById('expenseChart').getContext('2d');
    const agg = {};
    expenseCategories.forEach(c=>{ for(let d=1; d<=daysInMonth(currentYear,currentMonth); d++){ const v=getVal('exp',c.id,currentYear,currentMonth,d); if(v!=='') agg[c.name]=(agg[c.name]||0)+v; } });
    const labels = Object.keys(agg);
    const values = Object.values(agg);
    if (chartInstance) chartInstance.destroy();
    if (labels.length > 0) {
      chartInstance = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: labels,
          datasets: [{
            data: values,
            backgroundColor: ['#f87171','#fb923c','#fbbf24','#a3e635','#34d399','#22d3ee','#818cf8','#c084fc']
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              labels: { font: { size: 10 } }
            }
          }
        }
      });
    }
  }

  // Обработчики
  document.getElementById('tableContainer').addEventListener('click', e => {
    if (e.target.classList.contains('remove-cat')) {
      const catId = e.target.dataset.id;
      const type = e.target.dataset.type;
      removeCategory(type, catId);
    }
  });

  document.getElementById('tableContainer').addEventListener('input', e => {
    if(e.target.classList.contains('money-input')) {
      let val = e.target.value;
      if(val.includes('+')) { try { val = eval(val); e.target.value = val; } catch(e) {} }
      const type = e.target.dataset.type, catId = e.target.dataset.cat, day = parseInt(e.target.dataset.day);
      pushUndo();
      setVal(type, catId, currentYear, currentMonth, day, val);
      if(type==='exp' && expenseCategories.find(c=>c.id===catId)?.name==='Кредит') {
        const old = getVal('exp',catId,currentYear,currentMonth,day);
        creditTotal = Math.max(0, creditTotal - (parseFloat(val||0) - parseFloat(old||0)));
      }
      save(); updateTotals(); renderTopCategories(); renderChart();
    }
  });

  document.getElementById('undoBtn').addEventListener('click', ()=>{
    if(UNDO_STACK.length===0) return;
    const prev = UNDO_STACK.pop();
    incomeCategories=prev.incomeCategories; expenseCategories=prev.expenseCategories; data=prev.data;
    debts=prev.debts; goals=prev.goals; creditTotal=prev.creditTotal; payments=prev.payments;
    save(); renderAll();
  });

  document.getElementById('scrollTodayBtn').addEventListener('click', scrollToToday);
  document.getElementById('addIncomeCatBtn').addEventListener('click', ()=>{ const n=prompt('Доход:'); if(n){ pushUndo(); incomeCategories.push({id:genId(),name:n}); save(); renderAll(); } });
  document.getElementById('addExpenseCatBtn').addEventListener('click', ()=>{ const n=prompt('Расход:'); if(n){ pushUndo(); expenseCategories.push({id:genId(),name:n}); save(); renderAll(); } });
  document.getElementById('clearAllDataBtn').addEventListener('click', ()=>{ if(confirm('Удалить всё?')){ localStorage.clear(); location.reload(); } });
  document.getElementById('backupBtn').addEventListener('click', ()=>{ const b=new Blob([JSON.stringify({incomeCategories,expenseCategories,data,debts,goals,creditTotal,payments})]); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='budget.json'; a.click(); });
  document.getElementById('restoreBtn').addEventListener('click', ()=>{ const i=document.createElement('input'); i.type='file'; i.accept='.json'; i.onchange=()=>{ const r=new FileReader(); r.onload=()=>{ const o=JSON.parse(r.result); incomeCategories=o.incomeCategories; expenseCategories=o.expenseCategories; data=o.data; debts=o.debts; goals=o.goals; creditTotal=o.creditTotal; payments=o.payments||[]; save(); renderAll(); }; r.readAsText(i.files[0]); }; i.click(); });
  document.getElementById('payCreditBtn').addEventListener('click', ()=>{ const a=parseFloat(prompt('Сумма:')); if(!isNaN(a)){ creditTotal=Math.max(0,creditTotal-a); save(); updateTotals(); } });
  document.getElementById('creditTotalInput').addEventListener('input', function(){ creditTotal=parseFloat(this.value)||0; save(); updateTotals(); });
  document.getElementById('addDebtBtn').addEventListener('click', ()=>{ const p=document.getElementById('debtPersonInput').value.trim(), a=parseFloat(document.getElementById('debtAmountInput').value); if(p&&!isNaN(a)){ debts.push({person:p,amount:a}); save(); renderDebts(); } });
  document.getElementById('debtList').addEventListener('click', e=>{ if(e.target.classList.contains('delete-debt')){ debts.splice(e.target.dataset.index,1); save(); renderDebts(); } });
  document.getElementById('addGoalBtn').addEventListener('click', ()=>{ const n=document.getElementById('goalNameInput').value.trim(), t=parseFloat(document.getElementById('goalTargetInput').value); if(n&&!isNaN(t)){ goals.push({name:n,target:t,saved:0}); save(); renderGoals(); } });
  document.getElementById('goalsList').addEventListener('click', e=>{ const i=e.target.dataset.index; if(e.target.classList.contains('delete-goal')){ goals.splice(i,1); save(); renderGoals(); } if(e.target.classList.contains('add-to-goal')){ const a=parseFloat(prompt('Сумма:')); if(!isNaN(a)&&a>0){ goals[i].saved+=a; save(); renderGoals(); updateTotals(); } } });
  document.getElementById('addPaymentBtn').addEventListener('click', ()=>{ const n=document.getElementById('paymentNameInput').value.trim(), a=parseFloat(document.getElementById('paymentAmountInput').value), d=document.getElementById('paymentDateInput').value; if(n&&!isNaN(a)&&d){ payments.push({name:n,amount:a,date:d,paid:false}); save(); renderPayments(); } });
  document.getElementById('paymentsList').addEventListener('click', e=>{ const i=e.target.dataset.index; if(e.target.classList.contains('toggle-paid')){ payments[i].paid=!payments[i].paid; save(); renderPayments(); } if(e.target.classList.contains('delete-payment')){ payments.splice(i,1); save(); renderPayments(); } });
  document.getElementById('budgetLimitInput').addEventListener('input', function(){ localStorage.setItem('budget_limit', parseFloat(this.value)||0); updateTotals(); });

  document.querySelectorAll('.accordion-header').forEach(h => h.addEventListener('click', ()=> h.parentElement.classList.toggle('open')));
  document.getElementById('prevMonthBtn').addEventListener('click', ()=>{ if(currentMonth===1){currentMonth=12;currentYear--;} else currentMonth--; renderAll(); });
  document.getElementById('nextMonthBtn').addEventListener('click', ()=>{ if(currentMonth===12){currentMonth=1;currentYear++;} else currentMonth++; renderAll(); });
  document.getElementById('todayBtn').addEventListener('click', ()=>{ initDate(); renderAll(); });
  document.getElementById('themeToggle').addEventListener('click', ()=>{ document.body.classList.toggle('dark'); localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light'); });
  if(localStorage.getItem('theme')==='dark') document.body.classList.add('dark');

  initDate(); load(); renderAll();
  document.getElementById('creditTotalInput').value = creditTotal || '';
})();
</script>
</body>
</html>
